  updateFeedback: "/feedback/updateFeedback"
  deleteMethod: "DELETE"
  deleteFeedback: "/feedback/deleteFeedback"
  ddlExecute: "/feedback/ddl"
  ddlResponseTimeout: "3600000"
  
